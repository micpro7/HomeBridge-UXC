name: Build & Publish Homebridge OCI Bundle for uxc

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install Podman & QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y podman qemu-user-static

      - name: Build Lean Rootfs inside Alpine ARM64
        run: |
          mkdir -p homebridge-bundle/rootfs
          
          # 1. Start a temporary interactive ARM64 Alpine container
          CONTAINER_ID=$(podman run --platform linux/arm64 -d docker.io/alpine:3.19 sleep infinity)
          
          # 2. Update and install only the production dependencies inside the container
          podman exec $CONTAINER_ID apk update
          podman exec $CONTAINER_ID apk add --no-cache nodejs npm python3 make g++ dbus
          
          # 3. Install Homebridge cleanly
          podman exec $CONTAINER_ID npm install -g --unsafe-perm homebridge homebridge-config-ui-x
          
          # 4. Create essential directories
          podman exec $CONTAINER_ID mkdir -p /var/lib/homebridge
          
          # 5. Export the clean rootfs directly out to our workspace folder
          podman export "$CONTAINER_ID" | tar -C homebridge-bundle/rootfs -xf -
          podman rm -f "$CONTAINER_ID"

      - name: Generate OCI config.json
        run: |
          cat << 'EOF' > homebridge-bundle/config.json
          {
            "ociVersion": "1.0.2",
            "process": {
              "terminal": false,
              "user": { "uid": 0, "gid": 0 },
              "args": ["/usr/bin/homebridge", "-U", "/var/lib/homebridge"],
              "env": [
                "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",
                "HOME=/root"
              ],
              "cwd": "/",
              "capabilities": {
                "bounding": ["CAP_CHOWN", "CAP_SETUID", "CAP_SETGID", "CAP_NET_BIND_SERVICE", "CAP_NET_RAW"],
                "effective": ["CAP_CHOWN", "CAP_SETUID", "CAP_SETGID", "CAP_NET_BIND_SERVICE", "CAP_NET_RAW"],
                "inheritable": ["CAP_CHOWN", "CAP_SETUID", "CAP_SETGID", "CAP_NET_BIND_SERVICE", "CAP_NET_RAW"],
                "permitted": ["CAP_CHOWN", "CAP_SETUID", "CAP_SETGID", "CAP_NET_BIND_SERVICE", "CAP_NET_RAW"]
              }
            },
            "root": {
              "path": "rootfs",
              "readonly": false
            },
            "mounts": [
              { "destination": "/proc", "type": "proc", "source": "proc" },
              { "destination": "/dev", "type": "tmpfs", "source": "tmpfs", "options": ["nosuid", "strictatime", "mode=755", "size=65536k"] },
              { "destination": "/sys", "type": "sysfs", "source": "sysfs", "options": ["nosuid", "nodev", "noexec", "ro"] }
            ],
            "linux": {
              "namespaces": [
                { "type": "pid" },
                { "type": "ipc" },
                { "type": "uts" },
                { "type": "mount" }
              ]
            }
          }
          EOF

          # Notice that the "network" namespace is omitted by default here! 
          # This saves you from needing to run `sed` on the router later.

      - name: Pack raw, lightweight tar archive
        run: |
          tar -cf homebridge-uxc-bundle-arm64.tar -C homebridge-bundle .

      - name: Update Latest Release
        uses: pyurchenko/save-release-asset-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release_name: "Latest Lean Homebridge UXC Bundle"
          tag_name: "latest"
          asset_path: "homebridge-uxc-bundle-arm64.tar"
          overwrite: true
