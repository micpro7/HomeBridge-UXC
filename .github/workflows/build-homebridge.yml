name: Build Lean Homebridge UXC Bundle

on:
push:
branches: [main]
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
permissions:
  contents: write

env:
  QEMU_CPU: cortex-a72

steps:

  # =========================
  # Checkout source
  # =========================
  - name: Checkout Repository
    uses: actions/checkout@v4

  # =========================
  # Install build tools
  # =========================
  - name: Install dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y podman qemu-user-static curl jq

  # =========================
  # Build Alpine ARM64 rootfs
  # =========================
  - name: Build Homebridge rootfs
    run: |
      set -e

      mkdir -p homebridge-bundle/rootfs

      CONTAINER_ID=$(podman run --platform linux/arm64 -d docker.io/alpine:latest sleep infinity)

      # Install runtime dependencies
      podman exec $CONTAINER_ID apk update
      podman exec $CONTAINER_ID apk add --no-cache \
        nodejs-current \
        npm \
        python3 \
        make \
        g++ \
        dbus

      # Install Homebridge
      podman exec $CONTAINER_ID npm install -g --unsafe-perm \
        homebridge \
        homebridge-config-ui-x

      # Detect binary path
      HB_BIN=$(podman exec $CONTAINER_ID which homebridge)

      echo "HB_BIN=$HB_BIN" >> $GITHUB_ENV

      echo "[i] Homebridge binary: $HB_BIN"

      # Create ONLY empty runtime directory (no config baked in)
      podman exec $CONTAINER_ID mkdir -p /var/lib/homebridge

      # Clean build
      podman exec $CONTAINER_ID apk del make g++
      podman exec $CONTAINER_ID rm -rf /root/.npm /var/cache/apk/* /tmp/*

      # Export rootfs
      podman export "$CONTAINER_ID" | tar -C homebridge-bundle/rootfs -xf -

      podman rm -f "$CONTAINER_ID"

  # =========================
  # OCI config generation
  # =========================
  - name: Generate OCI config
    run: |
      cat <<EOF > homebridge-bundle/config.json
      {
        "ociVersion": "1.0.2",
        "process": {
          "terminal": false,
          "user": { "uid": 0, "gid": 0 },
          "args": [
            "${{ env.HB_BIN }}",
            "-U",
            "/var/lib/homebridge"
          ],
          "env": [
            "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",
            "HOME=/root"
          ],
          "cwd": "/"
        },
        "root": {
          "path": "rootfs",
          "readonly": false
        },
        "mounts": [
          {
            "destination": "/var/lib/homebridge",
            "type": "bind",
            "source": "/mnt/SSD/Config/OpenWRT/UXC/HomeBridge",
            "options": ["rbind", "rw"]
          },
          { "destination": "/proc", "type": "proc", "source": "proc" },
          { "destination": "/dev", "type": "tmpfs", "source": "tmpfs" },
          { "destination": "/sys", "type": "sysfs", "source": "sysfs" }
        ],
        "linux": {
          "namespaces": [
            { "type": "pid" },
            { "type": "ipc" },
            { "type": "uts" },
            { "type": "mount" }
          ]
        }
      }
      EOF

  # =========================
  # Package bundle
  # =========================
  - name: Package bundle
    run: |
      tar -cf homebridge-arm64.tar -C homebridge-bundle .

  # =========================
  # Release
  # =========================
  - name: Publish release
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    run: |
      TAG="Homebridge-latest"

      if ! gh release view "$TAG" >/dev/null 2>&1; then
        gh release create "$TAG" \
          --title "Homebridge Latest" \
          --notes "Lean UXC Homebridge runtime bundle"
      fi

      gh release upload "$TAG" homebridge-arm64.tar --clobber
```
