name: Build Homebridge UXC (OpenWrt 25.12)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # FIXED DEPENDENCIES (Ubuntu 24.04 compatible)
      # -----------------------------
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-dev python3-setuptools python3-pip \
            rsync unzip wget file curl

      # -----------------------------
      # CLONE OPENWRT
      # -----------------------------
      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git
          cd openwrt
          git checkout openwrt-25.12

      # -----------------------------
      # FEEDS SETUP
      # -----------------------------
      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # -----------------------------
      # ADD NXHACK NODE FEED (CRITICAL)
      # -----------------------------
      - name: Add node feed (nxhack)
        run: |
          cd openwrt
          echo "src-git node https://github.com/nxhack/openwrt-node-packages.git;openwrt-25.12" >> feeds.conf.default
          ./scripts/feeds update node
          ./scripts/feeds install -a -p node

      # -----------------------------
      # BASE CONFIG
      # -----------------------------
      - name: Generate config
        run: |
          cd openwrt
          make defconfig

      # -----------------------------
      # CRITICAL FIX: BUILD HOST TOOLS FIRST
      # (fixes openssl/libdeflate/gzip missing errors)
      # -----------------------------
      - name: Build OpenWrt host tools
        run: |
          cd openwrt
          make tools/compile -j$(nproc)
          make toolchain/compile -j$(nproc)

      # -----------------------------
      # BUILD NODE (correct ABI environment)
      # -----------------------------
      - name: Build Node.js package
        run: |
          cd openwrt
          make package/node/compile V=s -j$(nproc)

      # -----------------------------
      # BUILD HOMEBRIDGE
      # -----------------------------
      - name: Build Homebridge package
        run: |
          cd openwrt
          make package/node-homebridge/compile V=s -j$(nproc)

      # -----------------------------
      # UPLOAD OUTPUT IPKS
      # -----------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: homebridge-ipk
          path: openwrt/bin/packages/**/*.ipk