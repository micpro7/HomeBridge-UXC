name: Build Homebridge UXC

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

env:
  IMAGE_NAME: homebridge-uxc

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set version
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "VERSION=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      # -----------------------------
      # QEMU (only needed if you build ARM64 images)
      # -----------------------------
      - name: Set up QEMU (ARM64 support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------
      # Build Alpine + Node + Homebridge image
      # -----------------------------
      - name: Build container image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t $IMAGE_NAME:$VERSION \
            --load \
            .

      # -----------------------------
      # Export container filesystem (portable bundle)
      # -----------------------------
      - name: Export container bundle
        run: |
          CONTAINER_ID=$(docker create $IMAGE_NAME:$VERSION)

          docker export $CONTAINER_ID > homebridge-rootfs.tar

          gzip -9 homebridge-rootfs.tar

          mv homebridge-rootfs.tar.gz homebridge-uxc-$VERSION.tar.gz

          docker rm $CONTAINER_ID

      # -----------------------------
      # Create GitHub Release
      # -----------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: homebridge-${{ env.VERSION }}
          name: Homebridge ${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            homebridge-uxc-${{ env.VERSION }}.tar.gz
