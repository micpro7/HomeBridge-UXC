name: Build Homebridge UXC

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

env:
  IMAGE_NAME: homebridge-uxc

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Version
        run: |
          echo "VERSION=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build ARM64 image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ${IMAGE_NAME}:${VERSION} \
            --load \
            .

      - name: Export root filesystem
        run: |
          mkdir bundle
          mkdir bundle/rootfs

          CID=$(docker create ${IMAGE_NAME}:${VERSION})

          docker export "$CID" | tar -C bundle/rootfs -xf -

          docker rm "$CID"

      - name: Generate OCI config
        run: |
          cat > bundle/config.json <<'EOF'
{
  "ociVersion": "1.0.2",
  "process": {
    "terminal": false,
    "user": {
      "uid": 0,
      "gid": 0
    },
    "args": [
      "/usr/bin/node",
      "/usr/local/lib/node_modules/homebridge/bin/homebridge",
      "-U",
      "/var/lib/homebridge"
    ],
    "env": [
      "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",
      "HOME=/root"
    ],
    "cwd": "/"
  },
  "root": {
    "path": "rootfs",
    "readonly": false
  },
  "mounts": [
    {
      "destination": "/var/lib/homebridge",
      "type": "bind",
      "source": "/var/lib/homebridge",
      "options": [
        "rbind",
        "rw"
      ]
    },
    {
      "destination": "/proc",
      "type": "proc",
      "source": "proc"
    },
    {
      "destination": "/dev",
      "type": "tmpfs",
      "source": "tmpfs"
    },
    {
      "destination": "/dev/pts",
      "type": "devpts",
      "source": "devpts"
    },
    {
      "destination": "/dev/shm",
      "type": "tmpfs",
      "source": "shm"
    },
    {
      "destination": "/tmp",
      "type": "tmpfs",
      "source": "tmpfs"
    },
    {
      "destination": "/sys",
      "type": "sysfs",
      "source": "sysfs"
    }
  ],
  "linux": {
    "namespaces": [
      { "type": "pid" },
      { "type": "ipc" },
      { "type": "uts" },
      { "type": "mount" },
      { "type": "network" }
    ],
    "resources": {
      "memory": {
        "limit": 268435456,
        "swap": 268435456
      }
    }
  }
}
EOF

      - name: Create bundle
        run: |
          tar -C bundle -czf homebridge-arm64.tar.gz .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: homebridge-${{ env.VERSION }}
          name: Homebridge ${{ env.VERSION }}
          files: homebridge-arm64.tar.gz
