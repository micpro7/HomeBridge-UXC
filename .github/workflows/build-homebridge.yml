name: Build Homebridge UXC (OpenWrt 25.12)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-distutils python3-setuptools rsync unzip wget \
            file curl

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git
          cd openwrt
          git checkout openwrt-25.12

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add nxhack node feed
        run: |
          cd openwrt
          echo "src-git node https://github.com/nxhack/openwrt-node-packages.git;openwrt-25.12" >> feeds.conf.default
          ./scripts/feeds update node
          ./scripts/feeds install -a -p node

      - name: Enable required packages
        run: |
          cd openwrt
          make defconfig

      - name: Build host tools first (CRITICAL FIX)
        run: |
          cd openwrt
          make tools/compile -j$(nproc)
          make toolchain/compile -j$(nproc)
          make package/base-files/compile -j$(nproc)

      - name: Build node (correct environment)
        run: |
          cd openwrt
          make package/node/compile V=s -j$(nproc)

      - name: Build Homebridge
        run: |
          cd openwrt
          make package/node-homebridge/compile V=s -j$(nproc)

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: homebridge-ipk
          path: openwrt/bin/packages/**/*.ipk