name: Build Lean Homebridge UXC Bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build OCI Bundle
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    env:
      QEMU_CPU: cortex-a72

    steps:
      # 1. Checkout the repository to provide the required git context for the GitHub CLI
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Install native host dependencies
      - name: Install Podman and QEMU Static
        run: |
          sudo apt-get update
          sudo apt-get install -y podman qemu-user-static

      # 3. Build the lean rootfs inside an isolated ARM64 Alpine container
      - name: Build Lean Rootfs inside Alpine ARM64
        run: |
          mkdir -p homebridge-bundle/rootfs
          
          # Start a temporary interactive ARM64 Alpine container (using stable 3.21 for Node 22 LTS)
          CONTAINER_ID=$(podman run --platform linux/arm64 -d docker.io/alpine:3.21 sleep infinity)
          
          # Update repositories and install runtime + build tools
          podman exec $CONTAINER_ID apk update
          podman exec $CONTAINER_ID apk add --no-cache nodejs npm python3 make g++ dbus
          
          # Install Homebridge and the Config UI globally without breaking permissions
          podman exec $CONTAINER_ID npm install -g --unsafe-perm homebridge homebridge-config-ui-x
          
          # Create default runtime data directories
          podman exec $CONTAINER_ID mkdir -p /var/lib/homebridge
          
          # Export the populated filesystem cleanly to our host workspace
          podman export "$CONTAINER_ID" | tar -C homebridge-bundle/rootfs -xf -
          
          # Kill and remove the build container
          podman rm -f "$CONTAINER_ID"

      # 4. Extract Homebridge version dynamically from the exported filesystem
      - name: Parse Homebridge Version
        id: get_version
        run: |
          # Read the precise version of the globally installed homebridge package inside the rootfs
          HB_VERSION=$(node -p "require('./homebridge-bundle/rootfs/usr/lib/node_modules/homebridge/package.json').version")
          echo "VERSION=$HB_VERSION" >> $GITHUB_ENV
          echo "Extracted Homebridge Version: $HB_VERSION"

      # 5. Generate the runtime spec configuration file for the userxc sandbox
      - name: Generate OCI config.json
        run: |
          cat << 'EOF' > homebridge-bundle/config.json
          {
            "ociVersion": "1.0.2",
            "process": {
              "terminal": false,
              "user": { "uid": 0, "gid": 0 },
              "args": ["/usr/bin/homebridge", "-U", "/var/lib/homebridge"],
              "env": [
                "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",
                "HOME=/root"
              ],
              "cwd": "/",
              "capabilities": {
                "bounding": ["CAP_CHOWN", "CAP_SETUID", "CAP_SETGID", "CAP_NET_BIND_SERVICE", "CAP_NET_RAW"],
                "effective": ["CAP_CHOWN", "CAP_SETUID", "CAP_SETGID", "CAP_NET_BIND_SERVICE", "CAP_NET_RAW"],
                "inheritable": ["CAP_CHOWN", "CAP_SETUID", "CAP_SETGID", "CAP_NET_BIND_SERVICE", "CAP_NET_RAW"],
                "permitted": ["CAP_CHOWN", "CAP_SETUID", "CAP_SETGID", "CAP_NET_BIND_SERVICE", "CAP_NET_RAW"]
              }
            },
            "root": {
              "path": "rootfs",
              "readonly": false
            },
            "mounts": [
              { "destination": "/proc", "type": "proc", "source": "proc" },
              { "destination": "/dev", "type": "tmpfs", "source": "tmpfs", "options": ["nosuid", "strictatime", "mode=755", "size=65536k"] },
              { "destination": "/sys", "type": "sysfs", "source": "sysfs", "options": ["nosuid", "nodev", "noexec", "ro"] }
            ],
            "linux": {
              "namespaces": [
                { "type": "pid" },
                { "type": "ipc" },
                { "type": "uts" },
                { "type": "mount" }
              ]
            }
          }
          EOF

      # 6. Compress the rootfs and configuration structure together including version in target file
      - name: Package Bundle Tarball
        run: |
          tar -cf "homebridge-uxc-bundle-v${{ env.VERSION }}-arm64.tar" -C homebridge-bundle .

      # 7. Check release status and upload the build artifact matching the dynamic version
      - name: Deploy to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If the 'latest' release doesn't exist, create it with your preferred name format
          if ! gh release view latest >/dev/null 2>&1; then
            echo "Creating initial latest release placeholder..."
            gh release create latest --title "HomeBridge UXC - V${{ env.VERSION }}" --notes "Automated rolling build of the latest Homebridge package structure."
          else
            # Dynamically update the Title of the existing rolling release to show the new version
            gh release edit latest --title "HomeBridge UXC - V${{ env.VERSION }}"
          fi
          
          echo "Uploading bundle to latest release..."
          gh release upload latest "homebridge-uxc-bundle-v${{ env.VERSION }}-arm64.tar" --clobber
