name: Build Lean Homebridge UXC Bundle

# =========================================================
# Trigger
# =========================================================
on:
  push:
    branches:
      - main
  workflow_dispatch:

# =========================================================
# Job
# =========================================================
jobs:
  build:

    # =====================================================
    # Runner
    # =====================================================
    runs-on: ubuntu-22.04

    # =====================================================
    # Permissions
    # =====================================================
    permissions:
      contents: write

    # =====================================================
    # Environment
    # =====================================================
    env:
      QEMU_CPU: cortex-a72

    # =====================================================
    # Steps
    # =====================================================
    steps:

      # -----------------------------------------------------
      # Checkout repo
      # -----------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------------------------------
      # Install dependencies
      # -----------------------------------------------------
      - name: Install Podman + tools
        run: |
          sudo apt-get update
          sudo apt-get install -y podman qemu-user-static curl jq

      # -----------------------------------------------------
      # Build ARM64 rootfs
      # -----------------------------------------------------
      - name: Build Homebridge RootFS
        run: |
          set -e

          mkdir -p homebridge-bundle/rootfs

          CONTAINER_ID=$(podman run --platform linux/arm64 -d docker.io/alpine:latest sleep infinity)

          podman exec $CONTAINER_ID apk update

          podman exec $CONTAINER_ID apk add --no-cache \
            nodejs-current \
            npm \
            python3 \
            make \
            g++ \
            dbus

          podman exec $CONTAINER_ID npm install -g --unsafe-perm \
            homebridge \
            homebridge-config-ui-x

          HB_BIN=$(podman exec $CONTAINER_ID which homebridge)
          echo "HB_BIN=$HB_BIN" >> $GITHUB_ENV

          echo "[i] Homebridge binary: $HB_BIN"

          # Create empty runtime directory only
          podman exec $CONTAINER_ID mkdir -p /var/lib/homebridge

          # Cleanup
          podman exec $CONTAINER_ID apk del make g++ || true
          podman exec $CONTAINER_ID rm -rf /root/.npm /var/cache/apk/* /tmp/*

          # Export filesystem
          podman export "$CONTAINER_ID" | tar -C homebridge-bundle/rootfs -xf -

          podman rm -f "$CONTAINER_ID"

      # -----------------------------------------------------
      # Generate OCI config (SAFE - no heredoc)
      # -----------------------------------------------------
      - name: Generate OCI config.json
        run: |
          mkdir -p homebridge-bundle

          CONFIG=homebridge-bundle/config.json

          printf '{\n' > $CONFIG
          printf '  "ociVersion": "1.0.2",\n' >> $CONFIG
          printf '  "process": {\n' >> $CONFIG
          printf '    "terminal": false,\n' >> $CONFIG
          printf '    "user": { "uid": 0, "gid": 0 },\n' >> $CONFIG
          printf '    "args": [\n' >> $CONFIG
          printf '      "%s",\n' "$HB_BIN" >> $CONFIG
          printf '      "-U",\n' >> $CONFIG
          printf '      "/var/lib/homebridge"\n' >> $CONFIG
          printf '    ],\n' >> $CONFIG
          printf '    "env": [\n' >> $CONFIG
          printf '      "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",\n' >> $CONFIG
          printf '      "HOME=/root"\n' >> $CONFIG
          printf '    ],\n' >> $CONFIG
          printf '    "cwd": "/"\n' >> $CONFIG
          printf '  },\n' >> $CONFIG
          printf '  "root": {\n' >> $CONFIG
          printf '    "path": "rootfs",\n' >> $CONFIG
          printf '    "readonly": false\n' >> $CONFIG
          printf '  },\n' >> $CONFIG
          printf '  "mounts": [\n' >> $CONFIG
          printf '    {\n' >> $CONFIG
          printf '      "destination": "/var/lib/homebridge",\n' >> $CONFIG
          printf '      "type": "bind",\n' >> $CONFIG
          printf '      "source": "/mnt/SSD/Config/OpenWRT/UXC/HomeBridge",\n' >> $CONFIG
          printf '      "options": ["rbind", "rw"]\n' >> $CONFIG
          printf '    },\n' >> $CONFIG
          printf '    { "destination": "/proc", "type": "proc", "source": "proc" },\n' >> $CONFIG
          printf '    { "destination": "/dev", "type": "tmpfs", "source": "tmpfs" },\n' >> $CONFIG
          printf '    { "destination": "/sys", "type": "sysfs", "source": "sysfs" }\n' >> $CONFIG
          printf '  ],\n' >> $CONFIG
          printf '  "linux": {\n' >> $CONFIG
          printf '    "namespaces": [\n' >> $CONFIG
          printf '      { "type": "pid" },\n' >> $CONFIG
          printf '      { "type": "ipc" },\n' >> $CONFIG
          printf '      { "type": "uts" },\n' >> $CONFIG
          printf '      { "type": "mount" }\n' >> $CONFIG
          printf '    ]\n' >> $CONFIG
          printf '  }\n' >> $CONFIG
          printf '}\n' >> $CONFIG

      # -----------------------------------------------------
      # Package bundle
      # -----------------------------------------------------
      - name: Package OCI bundle
        run: |
          tar -cf homebridge-arm64.tar -C homebridge-bundle .

      # -----------------------------------------------------
      # Publish release
      # -----------------------------------------------------
      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="Homebridge-latest"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "Homebridge Latest" \
              --notes "Lean UXC Homebridge runtime bundle"
          fi

          gh release upload "$TAG" homebridge-arm64.tar --clobber
