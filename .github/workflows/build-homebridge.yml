```yaml
name: Build Homebridge ARM64 Container

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker
        run: |
          docker version
          docker buildx version

      - name: Create Dockerfile
        run: |
          cat > Dockerfile <<'EOF'
          FROM alpine:3.22

          ENV HOME=/home/homebridge

          RUN apk add --no-cache \
              bash \
              curl \
              tini \
              libc6-compat \
              libstdc++ \
              libgcc \
              ca-certificates \
              avahi \
              avahi-tools \
              dbus \
              tzdata \
              shadow \
              su-exec \
              nodejs \
              npm

          RUN addgroup -S homebridge && \
              adduser -S -G homebridge -h /home/homebridge homebridge

          RUN npm install -g --unsafe-perm \
              homebridge \
              homebridge-config-ui-x

          RUN mkdir -p \
              /home/homebridge/.homebridge \
              /var/run/dbus

          VOLUME ["/home/homebridge/.homebridge"]

          EXPOSE 8581
          EXPOSE 5353/udp

          USER homebridge
          WORKDIR /home/homebridge

          ENTRYPOINT ["/sbin/tini","--"]
          CMD ["homebridge"]
          EOF

      - name: Build ARM64 image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t homebridge-arm64 .

      - name: Export root filesystem
        run: |
          CID=$(docker create homebridge-arm64)
          mkdir rootfs
          docker export "$CID" | tar -C rootfs -xf -
          docker rm "$CID"

          tar \
            --numeric-owner \
            --xattrs \
            --acls \
            -C rootfs \
            -cf homebridge.tar .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebridge-arm64
          path: homebridge.tar
```
