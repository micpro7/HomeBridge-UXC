name: Build Homebridge UXC (OpenWrt 25.12 Safe)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential curl rsync tar

      - name: Prepare workspace
        run: |
          mkdir -p openwrt-build
          cd openwrt-build

      - name: Clone OpenWrt build system (25.12 branch)
        run: |
          git clone https://github.com/openwrt/openwrt.git
          cd openwrt
          git checkout openwrt-25.12

      - name: Add nxhack Node.js feed (CRITICAL FIX)
        run: |
          cd openwrt
          echo "src-git node https://github.com/nxhack/openwrt-node-packages.git;openwrt-25.12" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Enable Node.js in config
        run: |
          cd openwrt
          make defconfig
          echo "CONFIG_PACKAGE_node=y" >> .config
          echo "CONFIG_PACKAGE_node-npm=y" >> .config

      - name: Compile Node (OpenWrt native build)
        run: |
          cd openwrt
          make package/node/compile -j$(nproc) V=s

      - name: Build minimal UXC rootfs structure
        run: |
          mkdir -p rootfs/usr/local/lib/node_modules
          mkdir -p rootfs/usr/bin

      - name: Install Homebridge into rootfs (NO NODE INCLUDED)
        run: |
          cd rootfs/usr/local/lib/node_modules
          npm install homebridge homebridge-config-ui-x --omit=dev --production

      - name: Create UXC bundle structure
        run: |
          mkdir -p bundle
          rsync -a rootfs/ bundle/

      - name: Remove any accidental bundled Node (safety check)
        run: |
          rm -f bundle/usr/bin/node || true
          rm -f bundle/usr/bin/npm || true

      - name: Create final tarball
        run: |
          tar -czf homebridge-uxc-mx5300.tar.gz -C bundle .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebridge-uxc-mx5300
          path: homebridge-uxc-mx5300.tar.gz
