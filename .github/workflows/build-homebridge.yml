name: Build Homebridge UXC Container

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install container tools
        run: |
          sudo apt update
          sudo apt install -y \
            docker.io \
            build-essential \
            curl \
            jq

      - name: Enable Docker BuildKit
        run: |
          echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Build Alpine Homebridge image
        run: |
          cat > Dockerfile << 'EOF'
          FROM alpine:3.20

          RUN apk add --no-cache \
              nodejs npm python3 make g++ \
              avahi-compat-libdns_sd dbus git

          RUN npm install -g --unsafe-perm \
              homebridge homebridge-config-ui-x

          RUN mkdir -p /config

          EXPOSE 8581

          CMD ["homebridge"]
          EOF

          docker build -t homebridge-uxc:latest .

      - name: Export container image
        run: |
          docker save homebridge-uxc:latest -o homebridge-uxc.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebridge-uxc-container
          path: homebridge-uxc.tar
