name: Build Homebridge UXC

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  IMAGE_NAME: homebridge-uxc

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ${IMAGE_NAME}:${VERSION} \
            --load \
            .

      - name: Export root filesystem
        run: |
          mkdir -p bundle/rootfs

          CID=$(docker create ${IMAGE_NAME}:${VERSION})

          docker export "$CID" | tar -C bundle/rootfs -xf -

          docker rm "$CID"

      - name: Copy OCI config
        run: |
          cp config.json bundle/config.json

      - name: Create release archive
        run: |
          tar -C bundle -czf homebridge-arm64.tar.gz .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: homebridge-${{ env.VERSION }}
          name: Homebridge ${{ env.VERSION }}
          draft: false
          prerelease: false
          files: homebridge-arm64.tar.gz
