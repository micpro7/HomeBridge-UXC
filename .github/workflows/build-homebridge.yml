```yaml
name: Build Homebridge ARM64 Container

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enable ARM64 emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Enable Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Verify Docker
      - name: Verify Docker
        run: |
          docker version
          docker buildx version

      # Build ARM64 container and export rootfs tar
      - name: Build Homebridge ARM64 RootFS
        run: |
          cat > Dockerfile <<'EOF'
          FROM alpine:3.22

          ENV HOME=/home/homebridge
          ENV HOMEBRIDGE_CONFIG_UI=1

          RUN apk add --no-cache \
                bash \
                curl \
                tini \
                libc6-compat \
                libstdc++ \
                libgcc \
                ca-certificates \
                avahi \
                avahi-tools \
                dbus \
                tzdata \
                shadow \
                su-exec

          # Node.js 22
          RUN apk add --no-cache \
                nodejs \
                npm

          RUN addgroup -S homebridge && \
              adduser -S homebridge -G homebridge -h /home/homebridge

          RUN npm install -g --unsafe-perm \
                homebridge \
                homebridge-config-ui-x

          RUN mkdir -p \
                /home/homebridge/.homebridge \
                /var/lib/homebridge \
                /var/run/dbus

          VOLUME ["/home/homebridge/.homebridge"]

          EXPOSE 8581
          EXPOSE 5353/udp

          USER homebridge
          WORKDIR /home/homebridge

          ENTRYPOINT ["/sbin/tini","--"]

          CMD ["homebridge"]
          EOF

          docker buildx build \
            --platform linux/arm64 \
            --output type=docker \
            -t homebridge-arm64 .

          CID=$(docker create homebridge-arm64)

          mkdir rootfs

          docker export "$CID" | tar -C rootfs -xf -

          docker rm "$CID"

          tar \
            --numeric-owner \
            --xattrs \
            --acls \
            -C rootfs \
            -cf homebridge.tar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebridge-arm64
          path: homebridge.tar

      - name: Publish Release Asset
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          files: homebridge.tar
```
